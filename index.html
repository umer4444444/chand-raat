<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festive Chand Raat Mubarak from umar </title>
  <!-- We'll link style.css in main.js or here -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Elaborate Mehndi/Mandala Overlay -->
  <div class="mandala-overlay"></div>

  <!-- Hanging Festive Lanterns -->
  <div class="lanterns-container">
    <div class="lantern-wrapper" style="--delay: 0s; --height: 120px;">
      <div class="lantern-chain"></div>
      <div class="lantern">
        <div class="lantern-glow"></div>
      </div>
    </div>
    <div class="lantern-wrapper" style="--delay: 1.5s; --height: 180px;">
      <div class="lantern-chain"></div>
      <div class="lantern">
        <div class="lantern-glow"></div>
      </div>
    </div>
    <div class="lantern-wrapper" style="--delay: 0.7s; --height: 140px;">
      <div class="lantern-chain"></div>
      <div class="lantern">
        <div class="lantern-glow"></div>
      </div>
    </div>
  </div>

  <!-- The Crescent Moon (Gold & Bright) -->
  <div class="moon"></div>

  <!-- Blooming & Festive Canvas -->
  <canvas id="festiveCanvas"></canvas>

  <div class="content">
    <div class="stars-sparkle">✨ ⭐ ✨</div>
    <h1 class="greeting">Chand Raat<br>Mubarak! from umar</h1>
    <p class="subtitle">Embrace the joy, adorn your hands with henna, and let the celebrations begin!</p>
    <span class="signature">From Umar</span>
    <button id="magicBtn">Celebrate Now 🎉</button>
  </div>

  <!-- Ensure logic is loaded -->
  <script type="module" src="/main.js"></script>
</body>

</html>
